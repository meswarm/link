# ═══════════════════════════════════════
# 模型配置模板 — 添加新模型时复制此文件
# ═══════════════════════════════════════
#
# 使用步骤：
#   1. 复制此文件: cp models/_template.yaml models/my-model.yaml
#   2. 填写下方参数
#   3. 在 .env 中添加对应的 API Key 环境变量
#   4. Agent 配置中使用: model: "my-model"
#
# 文件名即为模型引用名（去掉 .yaml 后缀）

# 模型显示名称
name: my-model

# API 地址（必须兼容 OpenAI Chat Completions API）
base_url: "https://api.example.com/v1"

# API Key
# 使用 ${ENV_VAR} 引用 .env 中的环境变量
# 这样 Key 不会出现在配置文件中，安全且可版本控制
api_key: "${MY_API_KEY}"

# 模型标识符（API 调用时传入的 model 参数）
model: "model-name-v1"

# 默认参数（Agent 配置中可覆盖）
temperature: 0.7
enable_thinking: false

# 模型能力
vision: false             # 是否支持图像输入（多模态模型设为 true）

# ═══════════════════════════════════════
# 隔离设计说明
# ═══════════════════════════════════════
#
# 每个模型文件引用各自的环境变量名，实现 Key 隔离：
#
#   模型文件             引用的环境变量        .env 中的值
#   ──────────          ──────────           ──────────
#   qwen-plus.yaml   → ${DASHSCOPE_API_KEY} → sk-aaa...
#   gpt-4o.yaml      → ${OPENAI_API_KEY}    → sk-bbb...
#   deepseek-v3.yaml → ${DEEPSEEK_API_KEY}  → sk-ccc...
#   glm-4-plus.yaml  → ${ZHIPU_API_KEY}     → xxx...
#
# 支持的 API 格式：
#   所有兼容 OpenAI Chat API 的服务均可接入
